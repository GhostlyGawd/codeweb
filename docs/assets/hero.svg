<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" font-family="ui-sans-serif,system-ui,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <radialGradient id="bgH" cx="62%" cy="42%" r="75%">
      <stop offset="0" stop-color="#11161f"/>
      <stop offset="1" stop-color="#0d1117"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="1278" height="398" rx="24" fill="url(#bgH)" stroke="#30363d" stroke-width="2"/>

  <!-- faint backdrop nodes for depth -->
  <g fill="#8b949e" opacity="0.16">
    <circle cx="690" cy="70" r="4"/><circle cx="760" cy="350" r="5"/><circle cx="1230" cy="320" r="4"/>
    <circle cx="640" cy="250" r="3"/><circle cx="1240" cy="70" r="3"/><circle cx="560" cy="150" r="3"/>
  </g>

  <!-- right-side "system map" constellation -->
  <g stroke-linecap="round">
    <g stroke="#30363d" stroke-width="2">
      <line x1="1000" y1="205" x2="905" y2="120"/>
      <line x1="1000" y1="205" x2="1095" y2="128"/>
      <line x1="1000" y1="205" x2="885" y2="285"/>
      <line x1="1000" y1="205" x2="985" y2="92"/>
      <line x1="1000" y1="205" x2="1165" y2="195"/>
      <line x1="1000" y1="205" x2="828" y2="200"/>
      <line x1="905" y1="120" x2="985" y2="92"/>
      <line x1="1095" y1="128" x2="1165" y2="195"/>
      <line x1="1120" y1="255" x2="1070" y2="322"/>
      <line x1="885" y1="285" x2="955" y2="330"/>
      <line x1="885" y1="285" x2="812" y2="278"/>
      <line x1="1095" y1="128" x2="1185" y2="110"/>
    </g>
    <g stroke="#58a6ff" stroke-width="2.5" opacity="0.9">
      <line x1="1000" y1="205" x2="1095" y2="128"/>
      <line x1="1000" y1="205" x2="1120" y2="255"/>
    </g>
    <line x1="1000" y1="205" x2="828" y2="200" stroke="#ffb65c" stroke-width="2.5" opacity="0.8"/>

    <circle cx="1000" cy="205" r="22" fill="#58a6ff"/>
    <circle cx="905"  cy="120" r="13" fill="#3fb950"/>
    <circle cx="1095" cy="128" r="12" fill="#ffb65c"/>
    <circle cx="1120" cy="255" r="13" fill="#ff5c5c"/>
    <circle cx="885"  cy="285" r="14" fill="#a371f7"/>
    <circle cx="985"  cy="92"  r="9"  fill="#39c5cf"/>
    <circle cx="1165" cy="195" r="8"  fill="#79c0ff"/>
    <circle cx="828"  cy="200" r="9"  fill="#f778ba"/>
    <circle cx="955"  cy="330" r="8"  fill="#56d364"/>
    <circle cx="1070" cy="322" r="7"  fill="#e3b341"/>
    <circle cx="1185" cy="110" r="6"  fill="#58a6ff"/>
    <circle cx="812"  cy="278" r="6"  fill="#a371f7"/>
  </g>

  <!-- wordmark + durable positioning -->
  <text x="90" y="208" font-size="116" font-weight="600" letter-spacing="1.5" fill="#e6edf3">codeweb</text>
  <rect x="94" y="236" width="330" height="4" rx="2" fill="#58a6ff"/>
  <text x="94" y="286" font-size="32" letter-spacing="0.4" fill="#c9d1d9">the system map for your codebase</text>
  <text x="94" y="322" font-size="19" letter-spacing="0.2" fill="#8b949e">every symbol, call, and domain in your repo &#8212; one navigable, self-contained map</text>
</svg>
