name: release

# Publishing path for environments without `gh` or a GitHub-release API tool (remote agent
# sessions, bare CI). Two triggers, one job:
#   - tag push `vX.Y.Z`  — for environments that CAN push tags: the tag is the publish button.
#   - workflow_dispatch  — for environments that CANNOT (branch-scoped push policy denies
#     refs/tags/* with 403): the run creates the tag server-side at the dispatched ref, then
#     publishes. It must publish in the SAME run — a GITHUB_TOKEN-pushed tag never re-triggers
#     the `on: push: tags` path (GitHub's recursion guard).
# Notes are sliced from the matching CHANGELOG.md section. The full runbook lives in
# .claude/skills/release-tag/SKILL.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z). Empty = package.json version at the dispatched ref.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${INPUT_VERSION#v}"
            VERSION="${VERSION:-$(node -p "require('./package.json').version")}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # The tag must point at a commit whose package.json agrees with it — the lock-step rule
      # check-consistency enforces everywhere else, applied to the tag itself. Catches tagging
      # (or dispatching against) the wrong commit.
      - name: Verify version matches package.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::release version ${VERSION} does not match package.json version ${PKG} at this ref"
            exit 1
          fi

      - name: Create tag (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "v$VERSION" >/dev/null 2>&1; then
            echo "tag v$VERSION already exists on origin — reusing it"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v$VERSION" -m "codeweb v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Slice release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Exact-prefix match on "## [X.Y.Z]" (index(), not regex — dots stay literal),
          # capture until the next "## [" heading.
          awk -v ver="$VERSION" '
            !on && index($0, "## [" ver "]") == 1 { on = 1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "::warning::no CHANGELOG section found for ${VERSION}; using a pointer instead"
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)." > /tmp/notes.md
          fi

      # Idempotent: re-running (or re-pushing a tag) never duplicates or clobbers a release.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists — nothing to do"
            exit 0
          fi
          case "$TAG" in *-*) PRE=--prerelease ;; *) PRE= ;; esac
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "codeweb $TAG" \
            --notes-file /tmp/notes.md \
            --verify-tag $PRE

      # Spec J: distributable artifacts ride every release.
      # The .vsix always builds and attaches (no credentials needed); the npm and Marketplace
      # publishes are PREPARED but gated — they no-op with a notice until the maintainer
      # configures NPM_TOKEN / VSCE_PAT. Prep is shipped; publishing stays a human decision.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Package VS Code extension (.vsix) and attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          cd editor/vscode-codeweb
          npx --yes @vscode/vsce@latest package --no-dependencies --out "codeweb-lens.vsix"
          gh release upload "$TAG" codeweb-lens.vsix --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish to npm (gated on NPM_TOKEN)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN not configured — npm publish skipped (prep only)"
            exit 0
          fi
          npm publish --provenance --access public

      - name: Publish to VS Code Marketplace (gated on VSCE_PAT)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice::VSCE_PAT not configured — Marketplace publish skipped (prep only)"
            exit 0
          fi
          cd editor/vscode-codeweb
          npx --yes @vscode/vsce@latest publish --no-dependencies -p "$VSCE_PAT"
