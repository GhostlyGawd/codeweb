  <g transform="translate(48,62) scale(2.4)">
    <path d="M24.17 8.64 A11 11 0 1 0 24.17 23.36" fill="none" stroke="#c6f24e" stroke-width="4" stroke-linecap="round"/>
    <rect x="22.9" y="11.4" width="4.2" height="9.2" rx="2.1" fill="#c6f24e"/>
  </g>
  <text x="150" y="112" font-size="62" font-weight="800" letter-spacing="-2.5" fill="#ececee">code<tspan fill="#c6f24e">web</tspan></text>
  <text x="152" y="146" font-size="18" letter-spacing="0.3" fill="#9c99a6">Know what breaks before you write.</text>
