<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 262" width="820" height="262" role="img" aria-label="Sub-linear scaling">
<rect width="820" height="262" rx="12" fill="#100E14"/><text x="28" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="700" fill="#ECECEE" text-anchor="start">Sub-linear scaling</text><text x="28" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#9C99A6" text-anchor="start">pipeline runtime grows as symbols^b — fit by log-log OLS on 10 points (6 real repos + 4 synthetic)</text><rect x="70" y="150" width="660" height="3" rx="2" fill="#322E3A" stroke="none"/><rect x="69" y="144" width="2" height="15" rx="0" fill="#9C99A6" stroke="none"/><text x="70" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#9C99A6" text-anchor="middle">constant</text><text x="70" y="138" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" font-weight="400" fill="#9C99A6" text-anchor="middle">0.0</text><rect x="399" y="144" width="2" height="15" rx="0" fill="#FFB14E" stroke="none"/><text x="400" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#FFB14E" text-anchor="middle">linear</text><text x="400" y="138" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" font-weight="400" fill="#9C99A6" text-anchor="middle">1.0</text><rect x="729" y="144" width="2" height="15" rx="0" fill="#FF5D5D" stroke="none"/><text x="730" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#FF5D5D" text-anchor="middle">quadratic</text><text x="730" y="138" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" font-weight="400" fill="#9C99A6" text-anchor="middle">2.0</text><rect x="112.834" y="150.5" width="133.023" height="3" rx="2" fill="#5BD17A" stroke="none"/><circle cx="179.329" cy="151.5" r="7" fill="#5BD17A"/><text x="179.329" y="134" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="14" font-weight="700" fill="#5BD17A" text-anchor="middle">b = 0.3313</text><text x="70" y="214" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#9C99A6" text-anchor="start">95% CI [0.1298, 0.5329], R² 0.5647 — far below the 1.5 ceiling; a quadratic engine would land at 2.0 and fail.</text><text x="70" y="240" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#C6F24E" text-anchor="start">Query latency on the largest graph (ripgrep, 3201 symbols): ~95 ms typical, 117 ms worst-case median — inside an agent's edit loop.</text></svg>
