<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 300" width="1040" height="300" font-family="ui-sans-serif,system-ui,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <radialGradient id="bgD" cx="50%" cy="40%" r="80%">
      <stop offset="0" stop-color="#11161f"/><stop offset="1" stop-color="#0d1117"/>
    </radialGradient>
    <style>
      .box{fill:#161b22;stroke:#30363d;stroke-width:1.5}
      .glow{fill:none;stroke:#58a6ff;stroke-width:2.5;opacity:0;rx:14}
      .lbl{fill:#8b949e;font-size:18px;letter-spacing:.3px;text-anchor:middle}
      .num{fill:#0d1117;font-size:13px;font-weight:700;text-anchor:middle}
      @keyframes glow{0%{opacity:0}5%{opacity:1}19%{opacity:1}26%{opacity:0}100%{opacity:0}}
      @keyframes lift{0%{opacity:.55}5%{opacity:1}26%{opacity:.55}100%{opacity:.55}}
      .g1{animation:glow 6s linear infinite}.g2{animation:glow 6s linear infinite 1.5s}
      .g3{animation:glow 6s linear infinite 3s}.g4{animation:glow 6s linear infinite 4.5s}
      .l1{animation:lift 6s linear infinite}.l2{animation:lift 6s linear infinite 1.5s}
      .l3{animation:lift 6s linear infinite 3s}.l4{animation:lift 6s linear infinite 4.5s}
    </style>
  </defs>
  <rect x="1" y="1" width="1038" height="298" rx="20" fill="url(#bgD)" stroke="#30363d"/>

  <!-- connectors -->
  <g stroke="#30363d" stroke-width="2">
    <line x1="250" y1="150" x2="300" y2="150"/>
    <line x1="510" y1="150" x2="560" y2="150"/>
    <line x1="770" y1="150" x2="820" y2="150"/>
  </g>

  <!-- stage 1: extract — source becomes atomic nodes -->
  <g class="l1">
    <rect class="box" x="40" y="78" width="210" height="144" rx="12"/>
    <g>
      <circle cx="105" cy="140" r="7" fill="#8b949e"/><circle cx="145" cy="128" r="7" fill="#8b949e"/>
      <circle cx="185" cy="146" r="7" fill="#8b949e"/><circle cx="125" cy="166" r="7" fill="#8b949e"/>
      <circle cx="168" cy="172" r="7" fill="#8b949e"/>
    </g>
  </g>
  <rect class="glow g1" x="38" y="76" width="214" height="148" rx="14"/>
  <circle cx="60" cy="98" r="11" fill="#58a6ff"/><text class="num" x="60" y="103">1</text>
  <text class="lbl" x="145" y="252">extract</text>

  <!-- stage 2: cluster — nodes grouped into domains -->
  <g class="l2">
    <rect class="box" x="300" y="78" width="210" height="144" rx="12"/>
    <circle cx="368" cy="140" r="8" fill="#3fb950"/><circle cx="388" cy="158" r="8" fill="#3fb950"/>
    <circle cx="352" cy="160" r="8" fill="#3fb950"/>
    <circle cx="445" cy="135" r="8" fill="#58a6ff"/><circle cx="463" cy="153" r="8" fill="#58a6ff"/>
    <circle cx="430" cy="172" r="8" fill="#ffb65c"/>
  </g>
  <rect class="glow g2" x="298" y="76" width="214" height="148" rx="14"/>
  <circle cx="320" cy="98" r="11" fill="#58a6ff"/><text class="num" x="320" y="103">2</text>
  <text class="lbl" x="405" y="252">cluster</text>

  <!-- stage 3: overlap — a duplicate pair flagged -->
  <g class="l3">
    <rect class="box" x="560" y="78" width="210" height="144" rx="12"/>
    <circle cx="648" cy="150" r="18" fill="#ff5c5c" opacity="0.85"/>
    <circle cx="682" cy="150" r="18" fill="#ffb65c" opacity="0.85"/>
    <text x="665" y="125" fill="#e6edf3" font-size="16" text-anchor="middle">=</text>
  </g>
  <rect class="glow g3" x="558" y="76" width="214" height="148" rx="14"/>
  <circle cx="580" cy="98" r="11" fill="#58a6ff"/><text class="num" x="580" y="103">3</text>
  <text class="lbl" x="665" y="252">overlap</text>

  <!-- stage 4: render — the interactive report -->
  <g class="l4">
    <rect class="box" x="820" y="78" width="180" height="144" rx="12"/>
    <rect x="838" y="96" width="144" height="20" rx="4" fill="#0d1117" stroke="#30363d"/>
    <circle cx="852" cy="106" r="4" fill="#58a6ff"/>
    <rect x="838" y="126" width="62" height="78" rx="4" fill="#0d1117" stroke="#30363d"/>
    <rect x="846" y="136" width="46" height="6" rx="3" fill="#3fb950"/>
    <rect x="846" y="150" width="40" height="6" rx="3" fill="#ffb65c"/>
    <rect x="846" y="164" width="44" height="6" rx="3" fill="#ff5c5c"/>
    <rect x="846" y="178" width="34" height="6" rx="3" fill="#8b949e"/>
    <rect x="910" y="126" width="72" height="78" rx="4" fill="#0d1117" stroke="#30363d"/>
    <circle cx="946" cy="165" r="22" fill="none" stroke="#30363d"/>
    <circle cx="936" cy="155" r="5" fill="#58a6ff"/><circle cx="958" cy="160" r="4" fill="#3fb950"/>
    <circle cx="944" cy="178" r="4" fill="#a371f7"/>
  </g>
  <rect class="glow g4" x="818" y="76" width="184" height="148" rx="14"/>
  <circle cx="840" cy="98" r="11" fill="#58a6ff"/><text class="num" x="840" y="103">4</text>
  <text class="lbl" x="910" y="252">render</text>

  <!-- traveling pulse along the pipeline -->
  <circle r="6" cy="150" fill="#58a6ff">
    <animate attributeName="cx" values="40;1000" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.5;0.96;1" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
