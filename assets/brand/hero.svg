    <text x="430" y="166" fill="#ff5d5d" font-size="12">23 in blast</text>
    <text x="430" y="180" fill="#ff5d5d" font-size="12">radius</text>
    <text x="44" y="54" fill="#6a6775" font-size="11.5">// call graph · src/router</text>
