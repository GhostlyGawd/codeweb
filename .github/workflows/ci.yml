name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # codeweb's core has ZERO required deps; web-tree-sitter is an optionalDependency (the opt-in
      # exact-complexity tier). Install it so the tree-sitter tests actually run in CI instead of
      # taking their graceful no-engine skip — otherwise the tier ships untested.
      - name: Install (optional tree-sitter tier)
        run: npm ci
      # `node --test "tests/**/*.test.mjs"` needs Node 22 to expand the glob (Node 20 did not).
      - name: Run tests
        run: npm test

  # Spec C: the published numbers are promises, and promises are gates. bench:all measures the
  # pipeline, a representative 12-call MCP session, and per-tool response budgets, then fails the
  # build if any budget in bench/budgets.json is broken. (The corpus-dependent ts-engine bench
  # reports itself skipped here — explicitly, never silently.)
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install (optional tree-sitter tier)
        run: npm ci
      - name: Benchmarks hold their budgets
        run: npm run bench:all -- --gate

  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Public-comms lock-step: every version string agrees with package.json and the documented
      # MCP tool count equals the real TOOLS table in scripts/mcp-server.mjs. codeweb's own
      # "fail on regression" gate, applied to its marketing.
      - name: Check consistency
        run: node scripts/check-consistency.mjs
      # The website is a zero-dependency, deterministic build — it must build cleanly.
      - name: Build site
        run: node site/build.mjs
