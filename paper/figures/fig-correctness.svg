<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 242" width="820" height="242" role="img" aria-label="Correctness is exact at scale">
<rect width="820" height="242" rx="12" fill="#100E14"/><text x="28" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="700" fill="#ECECEE" text-anchor="start">Correctness is exact, at scale</text><text x="28" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#9C99A6" text-anchor="start">codeweb’s structural answers compared against independently-written reference oracles</text><rect x="28" y="92" width="370" height="132" rx="6" fill="#1A1820" stroke="none"/><text x="48" y="154" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="46" font-weight="800" fill="#5BD17A" text-anchor="start">0</text><text x="77" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#9C99A6" text-anchor="start">disagreements</text><text x="48" y="190" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#ECECEE" text-anchor="start">across 120,454 comparisons (cycles, impact, callers/callees, context-pack)</text><rect x="422" y="92" width="370" height="132" rx="6" fill="#1A1820" stroke="none"/><text x="442" y="154" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="46" font-weight="800" fill="#5BD17A" text-anchor="start">0</text><text x="471" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="400" fill="#9C99A6" text-anchor="start">violations</text><text x="442" y="190" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#ECECEE" text-anchor="start">across 20,000 edit-safety trials (pre-flight, campaign, shards, codemod)</text></svg>
