name: release

# Publishing path for environments without `gh` or a GitHub-release API tool (remote agent
# sessions, bare CI): push an annotated `vX.Y.Z` tag and this workflow publishes the GitHub
# Release server-side, with notes sliced from the matching CHANGELOG.md section. The full
# runbook lives in .claude/skills/release-tag/SKILL.md.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The tag must point at a commit whose package.json agrees with it — the lock-step rule
      # check-consistency enforces everywhere else, applied to the tag itself. Catches tagging
      # the wrong commit (e.g. main before the release PR merged).
      - name: Verify tag matches package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json version ${PKG} — tag the release commit"
            exit 1
          fi

      - name: Slice release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Exact-prefix match on "## [X.Y.Z]" (index(), not regex — dots stay literal),
          # capture until the next "## [" heading.
          awk -v ver="$VERSION" '
            !on && index($0, "## [" ver "]") == 1 { on = 1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "::warning::no CHANGELOG section found for ${VERSION}; using a pointer instead"
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)." > /tmp/notes.md
          fi

      # Idempotent: re-running (or re-pushing a tag) never duplicates or clobbers a release.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — nothing to do"
            exit 0
          fi
          case "${GITHUB_REF_NAME#v}" in *-*) PRE=--prerelease ;; *) PRE= ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "codeweb $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md \
            --verify-tag $PRE
