name: codeweb gate

# Dogfood: run codeweb's own structural regression gate on changes to the engine. Fails the PR on a
# new dependency cycle, a new duplication finding, or a symbol that loses all its callers — and
# posts the structural review (delta, renames, findings) as a sticky PR comment either way, so the
# gate is visible where reviewers already look, not only when it blocks.
on:
  pull_request:
    paths:
      - 'scripts/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the PR base sha is available for the before/after diff
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # Round 2 finding #3: without deps the self-gate analyzed every PR regex-only — blind to
      # AST-dispatch regressions in scripts/**, the exact class it exists to catch.
      - name: Install (optional tree-sitter tier)
        run: npm ci
      - name: codeweb regression gate (self)
        id: gate
        continue-on-error: true # verdict enforced after the comment posts
        run: node scripts/ci-gate.mjs --base "${{ github.event.pull_request.base.sha }}" --target scripts --md "$RUNNER_TEMP/codeweb-gate.md"
      - name: Post structural review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try { body = fs.readFileSync(process.env.RUNNER_TEMP + '/codeweb-gate.md', 'utf8'); }
            catch { core.info('no gate digest produced — skipping comment'); return; }
            const marker = '<!-- codeweb-gate -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const mine = comments.find((c) => c.body && c.body.includes(marker));
            if (mine) await github.rest.issues.updateComment({ ...context.repo, comment_id: mine.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
      - name: Enforce gate verdict
        if: steps.gate.outcome != 'success'
        run: |
          echo "::error::codeweb gate reported structural regressions (see the PR comment / job log above)"
          exit 1
