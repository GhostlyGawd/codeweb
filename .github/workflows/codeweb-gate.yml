name: codeweb gate

# Dogfood: run codeweb's own structural regression gate on changes to the engine. Fails the PR on a
# new dependency cycle, a new duplication finding, or a symbol that loses all its callers.
on:
  pull_request:
    paths:
      - 'scripts/**'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the PR base sha is available for the before/after diff
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: codeweb regression gate (self)
        run: node scripts/ci-gate.mjs --base "${{ github.event.pull_request.base.sha }}" --target scripts
