# FUNNEL §5 / RETENTION §4.5: the acquisition ledger — a weekly snapshot of the PUBLIC counters
# the maintainer can ethically read (npm weekly downloads, stars/forks). GitHub traffic data
# expires in 14 days and npm shows only a point-in-time number; this series is the only way
# acquisition/retention SHAPE ever becomes visible. No beacon, no user data — public APIs only.
name: acquisition ledger
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append this week's public counters
        run: |
          set -euo pipefail
          NPM=$(curl -sf 'https://api.npmjs.org/downloads/point/last-week/@ghostlygawd/codeweb' || echo '{}')
          REPO=$(curl -sf -H "Authorization: Bearer ${{ github.token }}" 'https://api.github.com/repos/${{ github.repository }}' || echo '{}')
          node -e '
            const npm = JSON.parse(process.argv[1] || "{}"), repo = JSON.parse(process.argv[2] || "{}");
            const row = {
              at: new Date().toISOString().slice(0, 10),
              npmWeeklyDownloads: npm.downloads ?? null,
              stars: repo.stargazers_count ?? null,
              forks: repo.forks_count ?? null,
              openIssues: repo.open_issues_count ?? null,
            };
            require("fs").appendFileSync("bench/acquisition-ledger.jsonl", JSON.stringify(row) + "\n");
            console.log("appended:", JSON.stringify(row));
          ' "$NPM" "$REPO"
      - name: Commit the row
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add bench/acquisition-ledger.jsonl
          git diff --cached --quiet || git commit -m 'ledger: weekly acquisition snapshot [skip ci]'
          git push
