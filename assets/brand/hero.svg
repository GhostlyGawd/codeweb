    <rect x="44" y="68" width="78" height="38" rx="6" fill="#14121a" stroke="#c6f24e" stroke-width="1.5"/>
    <text x="60" y="92" fill="#e7f6bf" font-size="13">router</text>
    <rect x="206" y="68" width="92" height="38" rx="6" fill="#14121a" stroke="#322e3a" stroke-width="1.5"/>
    <text x="221" y="92" fill="#cfcdd6" font-size="13">resolve</text>
    <rect x="120" y="238" width="92" height="38" rx="6" fill="#14121a" stroke="#322e3a" stroke-width="1.5"/>
    <text x="136" y="262" fill="#cfcdd6" font-size="13">render</text>
    <circle cx="360" cy="180" r="26" fill="none" stroke="#ff5d5d" stroke-width="1" opacity="0.35"/>
    <rect x="318" y="162" width="84" height="38" rx="6" fill="#1f1216" stroke="#ff5d5d" stroke-width="1.8"/>
